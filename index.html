<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cool Browser</title>
</head>
<body style="margin: 0; padding: 0; background: #333; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden;">

    <div style="background: #222; padding: 10px; display: flex; gap: 10px; align-items: center;">
        <button onclick="document.querySelector('webview').goBack()" style="padding: 5px 10px; cursor: pointer;">←</button>
        <button onclick="document.querySelector('webview').goForward()" style="padding: 5px 10px; cursor: pointer;">→</button>
        <input type="text" id="url-input" value="https://www.google.com" style="flex: 1; padding: 5px; border-radius: 3px; border: none;">
        <button id="go-btn" style="padding: 5px 15px; cursor: pointer; background: #444; color: white; border: none; border-radius: 3px;">Go</button>
        <button id="bookmark-btn" style="padding: 5px 10px; cursor: pointer;">⭐</button>
    </div>

    <div id="bookmarks-bar" style="background: #222; padding: 5px; display: flex; gap: 10px; align-items: center; min-height: 25px; border-top: 1px solid #333;">
        <span style="color: #aaa; font-size: 12px; margin-right: 5px;">Bookmarks:</span>
    </div>

    <div id="tabs-bar" style="background: #111; padding: 5px; display: flex; gap: 5px; align-items: center;">
        <button id="new-tab-btn" style="background: #333; color: white; border: none; padding: 3px 8px; cursor: pointer; border-radius: 3px;">+</button>
    </div>

    <div id="webview-container" style="flex: 1; display: flex; flex-direction: column; background: #fff;">
    </div>

    <script src="renderer.js"></script>
</body>
</html>
